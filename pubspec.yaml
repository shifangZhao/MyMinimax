name: myminimax
description: "Personal AI Agent App with Minimax API"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  dio: ^5.4.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  image_picker: ^1.0.0
  crop_your_image: ^2.0.0
  gal: ^2.3.0
  file_picker: ^8.0.0
  flutter_markdown: ^0.7.6
  flutter_math_fork: ^0.7.2
  video_player: ^2.9.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.0
  uuid: ^4.2.0
  crypto: ^3.0.6
  intl: ^0.20.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  path: ^1.9.0
  open_filex: ^4.7.0
  url_launcher: ^6.2.0
  http: ^1.2.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.0
  archive: ^4.0.2
  glob: ^2.1.3
  mime: ^2.0.0
  xml: ^6.6.1
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.17.0
  flutter_inappwebview: ^6.1.5
  web_socket_channel: ^3.0.1
  html: ^0.15.6

  pdf: ^3.11.0
  markdown: ^7.2.0
  charset: ^2.0.1
  flutter_quill: ">=11.5.0 <12.0.0"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.3
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.jpeg"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - lib/core/i18n/zh.json
    - lib/core/i18n/en.json
