kotlin.jvm.target.validation.mode=warning
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Flutter migrator flags — 当前插件不支持 builtInKotlin
android.builtInKotlin=false
android.newDsl=false
# 优化：开启 Gradle 缓存和并行构建
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
# Kotlin 增量编译（Kotlin 2.2 已修复跨驱动器问题）
kotlin.incremental=true
# OCR 原生库路径（PaddleOCR + ncnn）
opencvMobileDir=E\:/CODEPROJECT/ocr-libs/opencv-mobile-2.4.13.7-android
ncnnSdkDir=E\:/CODEPROJECT/ocr-libs/ncnn-20260113-android-vulkan
# 国内镜像配置 — 强制使用阿里云，禁止直连 Google
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.http.nonProxyHosts=
systemProp.https.nonProxyHosts=
